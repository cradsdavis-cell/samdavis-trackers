<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Not a tracker.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,800;1,700;1,800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #FAF7EE; color: #3E3418; font-family: "Inter", system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; }
  .box { max-width: 480px; text-align: center; }
  h1 { font-family: "Playfair Display", Georgia, serif; font-size: 56px; font-weight: 800; line-height: 1.04; margin-bottom: 18px; }
  h1 em { color: #8F7530; font-style: italic; }
  p { color: #6B5F3A; font-size: 18px; line-height: 1.5; margin-bottom: 28px; }
  a { color: #3E3418; text-decoration: none; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px; padding: 10px 18px; border: 1px solid #B0B490; border-radius: 8px; transition: background 0.15s; display: inline-block; }
  a:hover { background: #F2EEDD; }
</style>
</head>
<body>
  <div class="box">
    <h1>Not <em>a tracker.</em></h1>
    <p>This URL doesn't match any active tracker.</p>
    <a href="/samdavis-trackers/">&larr; Trackers hub</a>
  </div>
</body>
</html>
